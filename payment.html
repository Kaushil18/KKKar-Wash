<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - KKK Kar Wash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-car-front-fill"></i> KKK Kar Wash
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="bookings.html">
                            <i class="bi bi-calendar"></i> My Bookings
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-credit-card text-primary" style="font-size: 3rem;"></i>
                            <h3>Payment</h3>
                            <p class="text-muted">Complete your booking payment</p>
                        </div>

                        <div class="booking-summary mb-4 p-3 bg-light rounded">
                            <h6>Booking Summary</h6>
                            <div class="d-flex justify-content-between">
                                <span>Service:</span>
                                <span id="paymentServiceName">Loading...</span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span>Date:</span>
                                <span id="paymentDate">Loading...</span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span>Time:</span>
                                <span id="paymentTime">Loading...</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <strong>Total Amount:</strong>
                                <strong id="paymentAmount">$0.00</strong>
                            </div>
                        </div>

                        <form id="paymentForm">
                            <div class="mb-3">
                                <label class="form-label">Payment Method</label>
                                <div class="payment-methods d-flex gap-3">
                                    <button type="button" class="btn btn-outline-primary flex-fill payment-method active" data-method="card">
                                        <i class="bi bi-credit-card"></i> Card
                                    </button>
                                    <button type="button" class="btn btn-outline-primary flex-fill payment-method" data-method="cash">
                                        <i class="bi bi-cash"></i> Cash
                                    </button>
                                </div>
                            </div>

                            <div id="cardDetails">
                                <div class="mb-3">
                                    <label class="form-label">Card Number</label>
                                    <input type="text" class="form-control" placeholder="1234 5678 9012 3456">
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <label class="form-label">Expiry Date</label>
                                        <input type="text" class="form-control" placeholder="MM/YY">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">CVV</label>
                                        <input type="text" class="form-control" placeholder="123">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Cardholder Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe">
                                </div>
                            </div>

                            <div id="paymentError" class="alert alert-danger d-none"></div>
                            <button type="submit" class="btn btn-primary w-100" id="payBtn">
                                <span id="payText">Pay Now</span>
                                <span id="paySpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="bookings.html" class="text-decoration-none">Back to Bookings</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Payment page logic
        document.addEventListener('DOMContentLoaded', function() {
            // Get booking ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const bookingId = urlParams.get('bookingId');
            
            if (!bookingId) {
                alert('No booking specified');
                window.location.href = 'bookings.html';
                return;
            }

            // Load booking details
            loadBookingDetails(bookingId);

            // Payment method selection
            document.querySelectorAll('.payment-method').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.payment-method').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const method = this.dataset.method;
                    if (method === 'card') {
                        document.getElementById('cardDetails').style.display = 'block';
                    } else {
                        document.getElementById('cardDetails').style.display = 'none';
                    }
                });
            });

            // Payment form submission
            document.getElementById('paymentForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const method = document.querySelector('.payment-method.active').dataset.method;
                const errorEl = document.getElementById('paymentError');
                const btn = document.getElementById('payBtn');
                const btnText = document.getElementById('payText');
                const spinner = document.getElementById('paySpinner');
                
                errorEl.classList.add('d-none');
                btn.disabled = true;
                btnText.textContent = 'Processing...';
                spinner.classList.remove('d-none');

                try {
                    const response = await fetch(`${API_URL}/payments/process/${bookingId}`, {
                        method: 'POST',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ payment_method: method })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Payment failed');
                    }

                    alert('Payment successful! Your booking is confirmed.');
                    window.location.href = 'bookings.html';
                } catch (error) {
                    errorEl.textContent = error.message;
                    errorEl.classList.remove('d-none');
                } finally {
                    btn.disabled = false;
                    btnText.textContent = 'Pay Now';
                    spinner.classList.add('d-none');
                }
            });
        });

        async function loadBookingDetails(bookingId) {
            try {
                const response = await fetch(`${API_URL}/bookings/${bookingId}`, {
                    headers: getAuthHeaders()
                });

                if (!response.ok) throw new Error('Failed to load booking');

                const booking = await response.json();
                
                document.getElementById('paymentServiceName').textContent = booking.service_name;
                document.getElementById('paymentDate').textContent = new Date(booking.booking_date).toLocaleDateString();
                document.getElementById('paymentTime').textContent = booking.booking_time;
                document.getElementById('paymentAmount').textContent = `$${booking.service_price}`;
            } catch (error) {
                console.error('Error loading booking:', error);
                alert('Failed to load booking details');
            }
        }
    </script>
</body>
</html>
